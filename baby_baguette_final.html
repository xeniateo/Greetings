@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Caveat:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;}
#scene{
  width:100%;max-width:680px;height:580px;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#fff9f0 0%,#ffefd6 55%,#ffd9a0 100%);
  border-radius:24px;border:3px solid #ffcb8e;font-family:'Nunito',sans-serif;
}
.shelf{position:absolute;bottom:0;left:0;right:0;height:130px;background:#f0c878;border-top:5px solid #e0a84a;border-radius:0 0 22px 22px;}
.shelf-edge{position:absolute;bottom:130px;left:0;right:0;height:14px;background:#e8b450;}
#inst{
  position:absolute;left:50%;transform:translateX(-50%);top:calc(50% - 165px);
  background:white;border:3px solid #ffc06a;border-radius:30px;
  padding:12px 32px;font-size:18px;color:#b06030;white-space:nowrap;z-index:200;
  font-weight:900;box-shadow:0 4px 0 #ffc06a;pointer-events:none;text-align:center;
  transition:opacity 0.4s;
}
.tap-hint{
  position:absolute;background:#ff9f4a;color:white;border-radius:20px;
  padding:5px 14px;font-size:12px;font-weight:900;white-space:nowrap;
  pointer-events:none;z-index:50;box-shadow:0 3px 0 #e07020;
  animation:bobble 0.9s ease-in-out infinite alternate;
}
@keyframes bobble{from{transform:translateY(0);}to{transform:translateY(-5px);}}
.flour-p{position:absolute;border-radius:50%;background:rgba(255,255,255,0.92);pointer-events:none;z-index:60;}
#bun-badge{
  display:none;position:absolute;top:18px;left:50%;transform:translateX(-50%);
  background:white;border:3px solid #ffc06a;border-radius:30px;
  padding:12px 32px;font-size:18px;color:#b06030;font-weight:900;
  box-shadow:0 4px 0 #ffc06a;pointer-events:none;white-space:nowrap;z-index:210;
}
#announce-banner{
  position:absolute;top:148px;left:50%;transform:translateX(-50%) translateY(30px);
  background:white;border:3px solid #ffc06a;border-radius:20px;
  padding:16px 52px;text-align:center;z-index:300;
  box-shadow:0 6px 0 #ffc06a;opacity:0;
  transition:opacity 0.8s,transform 0.8s;
  white-space:nowrap;pointer-events:none;min-width:460px;
}
#announce-banner.show{opacity:1;transform:translateX(-50%) translateY(0);}
#announce-banner .l1{font-size:16px;font-weight:700;color:#b06030;display:block;margin-bottom:6px;font-family:'Caveat',cursive;}
#announce-banner .l2{font-size:30px;font-weight:700;color:#e04010;display:block;font-family:'Caveat',cursive;}
#restart-btn{
  position:absolute;bottom:14px;right:18px;padding:9px 22px;background:#ff9f4a;
  color:white;border:none;border-radius:30px;cursor:pointer;font-size:13px;
  font-weight:800;box-shadow:0 4px 0 #e07020;z-index:400;display:none;
}
</style>

<script>
const scene=document.getElementById('scene');
const inst=document.getElementById('inst');
const STEPS={FLOUR:0,BUTTER:1,EGGS:2,STIR:3,BAKE:4,DONE:5};
let step=STEPS.FLOUR,busy=false;
let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playFlourPour(){try{const ac=getAudio();const buf=ac.createBuffer(1,ac.sampleRate*1.2,ac.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.max(0,0.18*(1-i/d.length));const src=ac.createBufferSource();src.buffer=buf;const f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=1200;f.Q.value=0.5;const g=ac.createGain();g.gain.setValueAtTime(0.6,ac.currentTime);g.gain.linearRampToValueAtTime(0,ac.currentTime+1.2);src.connect(f);f.connect(g);g.connect(ac.destination);src.start();}catch(e){}}
function playButter(){try{const ac=getAudio();const osc=ac.createOscillator();osc.type='sine';osc.frequency.setValueAtTime(200,ac.currentTime);osc.frequency.linearRampToValueAtTime(80,ac.currentTime+0.3);const g=ac.createGain();g.gain.setValueAtTime(0.3,ac.currentTime);g.gain.linearRampToValueAtTime(0,ac.currentTime+0.35);osc.connect(g);g.connect(ac.destination);osc.start();osc.stop(ac.currentTime+0.4);}catch(e){}}
function playCrack(){try{const ac=getAudio();const buf=ac.createBuffer(1,ac.sampleRate*0.18,ac.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(ac.sampleRate*0.04));const src=ac.createBufferSource();src.buffer=buf;const f=ac.createBiquadFilter();f.type='highpass';f.frequency.value=2000;const g=ac.createGain();g.gain.value=0.8;src.connect(f);f.connect(g);g.connect(ac.destination);src.start();}catch(e){}}
function playWhisk(){try{const ac=getAudio();let t=ac.currentTime;for(let i=0;i<8;i++){const buf=ac.createBuffer(1,ac.sampleRate*0.18,ac.sampleRate);const d=buf.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*Math.exp(-j/(ac.sampleRate*0.06))*0.4;const src=ac.createBufferSource();src.buffer=buf;const f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=2400+i*100;f.Q.value=1;const g=ac.createGain();g.gain.value=0.35;src.connect(f);f.connect(g);g.connect(ac.destination);src.start(t);t+=0.34;}}catch(e){}}
function playCelebration(){try{const ac=getAudio();const notes=[523,659,784,1047,1319,784,1047,1319,1568];let t=ac.currentTime;notes.forEach(freq=>{const osc=ac.createOscillator();osc.type='triangle';osc.frequency.value=freq;const g=ac.createGain();g.gain.setValueAtTime(0.35,t);g.gain.linearRampToValueAtTime(0,t+0.22);osc.connect(g);g.connect(ac.destination);osc.start(t);osc.stop(t+0.25);t+=0.13;});}catch(e){}}

function setInst(t){inst.textContent=t;}
function hideInst(){inst.style.opacity='0';}
function showHint(id){const h=document.getElementById(id);if(h)h.style.display='block';}
function hideHint(id){const h=document.getElementById(id);if(h)h.style.display='none';}
function bowlCtr(){const el=document.getElementById('bowl-svg');const r=el.getBoundingClientRect(),sr=scene.getBoundingClientRect();return{x:r.left-sr.left+r.width/2,y:r.top-sr.top+r.height/2};}
function elR(el){const r=el.getBoundingClientRect(),sr=scene.getBoundingClientRect();return{l:r.left-sr.left,t:r.top-sr.top,w:r.width,h:r.height};}
function poof(cx,cy,n){for(let i=0;i<n;i++){const p=document.createElement('div');p.className='flour-p';const s=5+Math.random()*8;p.style.cssText=`width:${s}px;height:${s}px;left:${cx+(Math.random()-.5)*26-s/2}px;top:${cy-s/2}px;opacity:0.9;`;scene.appendChild(p);const vx=(Math.random()-.5)*90,vy=-(50+Math.random()*80);let t=0;const iv=setInterval(()=>{t+=0.026;p.style.left=(parseFloat(p.style.left)+vx*0.026)+'px';p.style.top=(parseFloat(p.style.top)+(vy*t+120*t*t)*0.026)+'px';p.style.opacity=Math.max(0,0.9-t*1.05);if(t>0.95){clearInterval(iv);p.remove();}},16);}}

document.getElementById('flour-bag').addEventListener('click',e=>{
  if(step!==STEPS.FLOUR||busy)return;busy=true;hideHint('flour-hint');
  const bag=document.getElementById('flour-bag');const bowl=bowlCtr();
  bag.style.pointerEvents='none';
  bag.style.transition='left 0.6s cubic-bezier(.34,1.4,.64,1),bottom 0.6s cubic-bezier(.34,1.4,.64,1),transform 0.6s ease';
  bag.style.left=(bowl.x-20)+'px';bag.style.bottom='240px';bag.style.transform='rotate(-118deg) scale(1.1)';
  playFlourPour();
  let pc=0;const pourX=bowl.x+10,pourY=scene.offsetHeight-252;
  const di=setInterval(()=>{poof(pourX,pourY,4);if(++pc>20)clearInterval(di);},75);
  setTimeout(()=>{document.getElementById('flour-in-bowl').style.transition='opacity 0.5s';document.getElementById('flour-in-bowl').setAttribute('opacity','1');poof(pourX,bowl.y-6,14);},630);
  setTimeout(()=>{bag.style.transition='transform 0.45s ease-in,opacity 0.45s ease-in';bag.style.transform='rotate(-130deg) scale(0.1)';bag.style.opacity='0';},1390);
  setTimeout(()=>{bag.style.display='none';step=STEPS.BUTTER;busy=false;setInst('Now add in the butter!');showHint('butter-hint');},1860);
});

function flyBowl(el,arcH,frames,cb){
  const r=elR(el),bowl=bowlCtr();const sx=r.l,sy=r.t,dx=bowl.x-r.w/2,dy=bowl.y-r.h/2;
  el.style.position='absolute';el.style.transition='none';el.style.left=sx+'px';el.style.top=sy+'px';el.style.bottom='auto';el.style.right='auto';
  let f=0;(function tick(){f++;const p=f/frames,e=p<.5?2*p*p:-1+(4-2*p)*p;el.style.left=(sx+(dx-sx)*e)+'px';el.style.top=(sy+(dy-sy)*e+arcH*Math.sin(Math.PI*p))+'px';el.style.transform=`rotate(${p*380}deg) scale(${1-p*.5})`;el.style.opacity=(1-Math.max(0,p-.75)*4).toFixed(2);if(f<frames)requestAnimationFrame(tick);else{el.style.display='none';cb();}})();
}

document.getElementById('butter-svg').addEventListener('click',e=>{
  if(step!==STEPS.BUTTER||busy)return;busy=true;hideHint('butter-hint');
  const el=document.getElementById('butter-svg');el.style.pointerEvents='none';playButter();
  flyBowl(el,-120,68,()=>{document.getElementById('mix-layer').setAttribute('opacity','0.5');step=STEPS.EGGS;busy=false;setInst('Crack in the eggs!');showHint('eggs-hint');});
});

document.getElementById('eggs-svg').addEventListener('click',e=>{
  if(step!==STEPS.EGGS||busy)return;busy=true;hideHint('eggs-hint');
  const el=document.getElementById('eggs-svg');el.style.pointerEvents='none';
  setTimeout(()=>{playCrack();document.getElementById('crack1').setAttribute('opacity','1');document.getElementById('crack2').setAttribute('opacity','1');},60);
  setTimeout(()=>{playCrack();const t1=document.getElementById('egg1-top'),t2=document.getElementById('egg2-top');t1.style.transition='transform .35s ease-out';t2.style.transition='transform .35s ease-out';t1.style.transform='translateY(-16px) rotate(-22deg)';t2.style.transform='translateY(-16px) rotate(22deg)';},260);
  setTimeout(()=>{document.getElementById('yolk1').style.transition='opacity .3s';document.getElementById('yolk2').style.transition='opacity .3s';document.getElementById('yolk1').setAttribute('opacity','1');document.getElementById('yolk2').setAttribute('opacity','1');},500);
  setTimeout(()=>{flyBowl(el,-100,66,()=>{document.getElementById('mix-layer').setAttribute('opacity','0.78');step=STEPS.STIR;busy=false;setInst('Mix all the ingredients together!');showHint('whisk-hint');});},920);
});

document.getElementById('whisk-svg').addEventListener('click',e=>{
  if(step!==STEPS.STIR||busy)return;busy=true;hideHint('whisk-hint');
  const wh=document.getElementById('whisk-svg');wh.style.pointerEvents='none';
  const r=elR(wh),bowl=bowlCtr();const sx=r.l,sy=r.t,destX=bowl.x-r.w/2,destY=bowl.y-r.h-16;
  wh.style.position='absolute';wh.style.transition='none';wh.style.left=sx+'px';wh.style.top=sy+'px';wh.style.bottom='auto';wh.style.right='auto';
  playWhisk();
  let f=0;(function moveIn(){f++;const p=f/36,e=p<.5?2*p*p:-1+(4-2*p)*p;wh.style.left=(sx+(destX-sx)*e)+'px';wh.style.top=(sy+(destY-sy)*e-45*Math.sin(Math.PI*p))+'px';if(f<36)requestAnimationFrame(moveIn);else doWhisk(wh,bowl,destX,destY);})();
});

function doWhisk(wh,bowl,cx,cy){
  const SWINGS=8,W=54,DUR=280;let sw=0;const fl=document.getElementById('flour-in-bowl'),ml=document.getElementById('mix-layer');
  function swing(){if(sw>=SWINGS){finishWhisk(wh,bowl);return;}const dir=sw%2===0?1:-1,prog=sw/SWINGS;wh.style.transition=`left ${DUR}ms ease-in-out,transform ${DUR}ms ease-in-out`;wh.style.left=(cx+dir*W)+'px';wh.style.transform=`rotate(${dir*20}deg)`;fl.setAttribute('opacity',Math.max(0,1-prog*2.2).toFixed(2));ml.setAttribute('opacity',Math.min(.95,prog*1.8).toFixed(2));const ri=Math.round(240-prog*50),gi=Math.round(216-prog*70),bi=Math.round(120-prog*80);ml.setAttribute('fill',`rgb(${ri},${gi},${bi})`);sw++;setTimeout(swing,DUR+30);}
  swing();
}

function finishWhisk(wh,bowl){
  wh.style.transition='top .5s ease-in,opacity .5s ease-in';wh.style.top=(parseFloat(wh.style.top)-80)+'px';wh.style.opacity='0';
  setTimeout(()=>wh.style.display='none',520);
  setTimeout(()=>document.getElementById('mix-layer').setAttribute('opacity','0'),200);
  riseDough(bowl);
}

function riseDough(bowl){
  const rise=document.getElementById('dough-rise');let t=0;const dur=60;rise.setAttribute('opacity','1');
  (function anim(){t++;const p=Math.min(t/dur,1),e=p<.5?2*p*p:-1+(4-2*p)*p;rise.setAttribute('ry',(4+e*16).toFixed(1));rise.setAttribute('rx','44');rise.setAttribute('cy',(90-e*24).toFixed(1));const r=Math.round(180+e*20),g=Math.round(140+e*12),b=Math.round(40+e*10);rise.setAttribute('fill',`rgb(${r},${g},${b})`);if(t<dur)requestAnimationFrame(anim);else{setTimeout(()=>{rise.setAttribute('opacity','0');document.getElementById('dough-blob').setAttribute('opacity','1');showDough();},200);}})();
}

function showDough(){document.getElementById('dough-svg').style.display='block';document.getElementById('dough-hint').style.display='block';step=STEPS.BAKE;busy=false;setInst('Send the dough into the oven!');}

document.getElementById('dough-svg').addEventListener('click',e=>{
  if(step!==STEPS.BAKE||busy)return;busy=true;step=STEPS.DONE;
  document.getElementById('dough-svg').style.pointerEvents='none';document.getElementById('dough-hint').style.display='none';
  hideInst();
  const ov=document.getElementById('oven-svg');ov.style.opacity='1';ov.style.transform='translateX(-50%) translateY(0)';
  setTimeout(()=>{const bowl=document.getElementById('bowl-svg');bowl.style.transition='opacity .5s';bowl.style.opacity='0';setTimeout(()=>bowl.style.display='none',500);sendDoughToOven();},1300);
});

function sendDoughToOven(){
  const dv=document.getElementById('dough-svg');const ov=document.getElementById('oven-svg');const or=elR(ov);
  const startX=scene.offsetWidth/2-50,startY=scene.offsetHeight-270;
  dv.style.display='block';dv.style.position='absolute';dv.style.left=startX+'px';dv.style.top=startY+'px';dv.style.bottom='auto';dv.style.right='auto';dv.style.opacity='1';dv.style.transform='scale(1)';
  const destX=or.l+or.w*.42,destY=or.t+or.h*.52;
  document.getElementById('oven-glow').setAttribute('opacity','0.45');document.getElementById('door-frame').setAttribute('fill','#a03020');
  ov.style.transition='transform .12s';ov.style.transform='translateX(-50%) scaleX(1.04)';setTimeout(()=>ov.style.transform='translateX(-50%) scaleX(1)',130);
  setTimeout(()=>{let f=0;(function fly(){f++;const p=f/55,e=p<.5?2*p*p:-1+(4-2*p)*p;dv.style.left=(startX+(destX-startX)*e)+'px';dv.style.top=(startY+(destY-startY)*e-70*Math.sin(Math.PI*p))+'px';dv.style.transform=`scale(${1-p*.65})`;dv.style.opacity=(1-Math.max(0,p-.7)*3.3).toFixed(2);if(f<55)requestAnimationFrame(fly);else{dv.style.display='none';document.getElementById('door-frame').setAttribute('fill','#6a2f24');ov.style.transition='transform .15s';ov.style.transform='translateX(-50%) scaleX(.97)';setTimeout(()=>ov.style.transform='translateX(-50%) scaleX(1)',160);document.getElementById('bun-badge').style.display='block';setTimeout(startBaking,400);}})();},380);
}

function startBaking(){
  document.getElementById('oven-glow').setAttribute('opacity','0.88');
  ['bun-tray','bag-shadow','bag-base','bag-body','bag-hi1','bag-hi2','bag-s1','bag-s2','bag-s3','bag-s4','bag-s5','bag-tip-l','bag-tip-r'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.setAttribute('opacity','1');
  });
  ['st1','st2','st3'].forEach(id=>document.getElementById(id).setAttribute('opacity','0.8'));
  document.getElementById('months-lbl').setAttribute('opacity','1');
  document.getElementById('timer-display').setAttribute('opacity','1');
  runDigitalTimer();
}

function animateFace(p){
  const s=Math.min(p,1);
  document.getElementById('bag-el').setAttribute('r',(s*11).toFixed(1));
  document.getElementById('bag-er').setAttribute('r',(s*11).toFixed(1));
  document.getElementById('bag-els').setAttribute('r',(s*3.5).toFixed(1));
  document.getElementById('bag-ers').setAttribute('r',(s*3.5).toFixed(1));
  document.getElementById('bag-cl').setAttribute('rx',(s*14).toFixed(1));document.getElementById('bag-cl').setAttribute('ry',(s*9).toFixed(1));
  document.getElementById('bag-cr').setAttribute('rx',(s*14).toFixed(1));document.getElementById('bag-cr').setAttribute('ry',(s*9).toFixed(1));
  document.getElementById('bag-nose').setAttribute('rx',(s*5).toFixed(1));document.getElementById('bag-nose').setAttribute('ry',(s*3.5).toFixed(1));
  document.getElementById('bag-smile').setAttribute('stroke-width',(s*3).toFixed(1));
  // baguette darkens golden as it bakes
  const br=Math.round(232+s*10),bg=Math.round(160+s*10),bb=Math.round(48-s*20);
  document.getElementById('bag-body').setAttribute('fill',`rgb(${br},${bg},${bb})`);
}

function runDigitalTimer(){
  const labels=['01:00','02:00','03:00','04:00'];
  const td=document.getElementById('timer-display');td.textContent='01:00';
  let idx=0;
  const iv=setInterval(()=>{
    idx++;
    if(idx<labels.length){
      td.textContent=labels[idx];
      try{const ac=getAudio();const osc=ac.createOscillator();osc.type='square';osc.frequency.value=1200;const g=ac.createGain();g.gain.setValueAtTime(0.12,ac.currentTime);g.gain.linearRampToValueAtTime(0,ac.currentTime+0.04);osc.connect(g);g.connect(ac.destination);osc.start();osc.stop(ac.currentTime+0.05);}catch(ex){}
      animateFace(idx/3);
    } else {
      clearInterval(iv);
      animateFace(1);
      // banner appears 1 second after 04:00
      setTimeout(()=>{
        playCelebration();
        document.getElementById('announce-banner').classList.add('show');
        document.getElementById('restart-btn').style.display='block';
      },1000);
    }
  },1500);
}

document.getElementById('restart-btn').addEventListener('click',()=>location.reload());
</script>
