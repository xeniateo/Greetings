<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;}
body{background:#f0e0c0;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:12px;}
#scene{
  width:100%;max-width:680px;height:580px;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#fff9f0 0%,#ffefd6 55%,#ffd9a0 100%);
  border-radius:24px;border:3px solid #ffcb8e;font-family:'Nunito',sans-serif;
}
.shelf{position:absolute;bottom:0;left:0;right:0;height:130px;background:#f0c878;border-top:5px solid #e0a84a;border-radius:0 0 22px 22px;}
.shelf-edge{position:absolute;bottom:130px;left:0;right:0;height:14px;background:#e8b450;}
#inst{
  position:absolute;left:50%;top:calc(50% - 160px);transform:translateX(-50%);
  background:white;border:3px solid #ffc06a;border-radius:30px;
  padding:12px 28px;font-size:17px;color:#b06030;white-space:nowrap;z-index:200;
  font-weight:900;box-shadow:0 4px 0 #ffc06a;pointer-events:none;
  transition:opacity 0.4s;
}
.hint{
  position:absolute;background:#ff9f4a;color:white;border-radius:20px;
  padding:5px 14px;font-size:12px;font-weight:900;white-space:nowrap;
  pointer-events:none;z-index:50;box-shadow:0 3px 0 #e07020;
  animation:bob 0.9s ease-in-out infinite alternate;
}
@keyframes bob{from{transform:translateY(0);}to{transform:translateY(-5px);}}
.fp{position:absolute;border-radius:50%;background:rgba(255,255,255,0.9);pointer-events:none;z-index:60;}
#badge{
  display:none;position:absolute;top:18px;left:50%;transform:translateX(-50%);
  background:white;border:3px solid #ffc06a;border-radius:30px;
  padding:12px 30px;font-size:17px;color:#b06030;font-weight:900;
  box-shadow:0 4px 0 #ffc06a;pointer-events:none;white-space:nowrap;z-index:210;
}
#banner{
  position:absolute;top:150px;left:50%;transform:translateX(-50%) translateY(40px);
  background:white;border:3px solid #ffc06a;border-radius:20px;
  padding:16px 50px;text-align:center;z-index:300;
  box-shadow:0 6px 0 #ffc06a;opacity:0;
  transition:opacity 0.8s,transform 0.8s;
  white-space:nowrap;pointer-events:none;min-width:460px;
}
#banner.show{opacity:1;transform:translateX(-50%) translateY(0);}
#banner .l1{font-size:21px;font-weight:700;color:#b06030;display:block;margin-bottom:4px;font-family:'Caveat',cursive;}
#banner .l2{font-size:42px;font-weight:700;color:#e04010;display:block;font-family:'Caveat',cursive;}
#rbtn{
  position:absolute;bottom:14px;right:18px;padding:9px 22px;background:#ff9f4a;
  color:white;border:none;border-radius:30px;cursor:pointer;font-size:13px;
  font-weight:800;box-shadow:0 4px 0 #e07020;z-index:400;display:none;
}
</style>
</head>

<script>
const SC = document.getElementById('scene');
const inst = document.getElementById('inst');
const STEP = {FLOUR:0,BUTTER:1,EGG:2,WHISK:3,BAKE:4,DONE:5};
let step = STEP.FLOUR, busy = false, AC = null;

function getAC() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  return AC;
}

function sfxPour() {
  try {
    const a = getAC(), b = a.createBuffer(1, a.sampleRate * 1.2, a.sampleRate), d = b.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.max(0, 0.18 * (1 - i / d.length));
    const s = a.createBufferSource(); s.buffer = b;
    const f = a.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1200; f.Q.value = 0.5;
    const g = a.createGain(); g.gain.setValueAtTime(0.6, a.currentTime); g.gain.linearRampToValueAtTime(0, a.currentTime + 1.2);
    s.connect(f); f.connect(g); g.connect(a.destination); s.start();
  } catch(e) {}
}

function sfxPlop() {
  try {
    const a = getAC(), o = a.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(200, a.currentTime); o.frequency.linearRampToValueAtTime(80, a.currentTime + 0.3);
    const g = a.createGain(); g.gain.setValueAtTime(0.3, a.currentTime); g.gain.linearRampToValueAtTime(0, a.currentTime + 0.35);
    o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime + 0.4);
  } catch(e) {}
}

function sfxCrack() {
  try {
    const a = getAC(), b = a.createBuffer(1, a.sampleRate * 0.18, a.sampleRate), d = b.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (a.sampleRate * 0.04));
    const s = a.createBufferSource(); s.buffer = b;
    const f = a.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 2000;
    const g = a.createGain(); g.gain.value = 0.8;
    s.connect(f); f.connect(g); g.connect(a.destination); s.start();
  } catch(e) {}
}

function sfxWhisk() {
  try {
    const a = getAC(); let t = a.currentTime;
    for (let i = 0; i < 8; i++) {
      const b = a.createBuffer(1, a.sampleRate * 0.18, a.sampleRate), d = b.getChannelData(0);
      for (let j = 0; j < d.length; j++) d[j] = (Math.random() * 2 - 1) * Math.exp(-j / (a.sampleRate * 0.06)) * 0.4;
      const s = a.createBufferSource(); s.buffer = b;
      const f = a.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 2400 + i * 100; f.Q.value = 1;
      const g = a.createGain(); g.gain.value = 0.35;
      s.connect(f); f.connect(g); g.connect(a.destination); s.start(t); t += 0.34;
    }
  } catch(e) {}
}

function sfxCele() {
  try {
    const a = getAC(), ns = [523, 659, 784, 1047, 1319, 784, 1047, 1319, 1568]; let t = a.currentTime;
    ns.forEach(fr => {
      const o = a.createOscillator(); o.type = 'triangle'; o.frequency.value = fr;
      const g = a.createGain(); g.gain.setValueAtTime(0.35, t); g.gain.linearRampToValueAtTime(0, t + 0.22);
      o.connect(g); g.connect(a.destination); o.start(t); o.stop(t + 0.25); t += 0.13;
    });
  } catch(e) {}
}

function setInst(t) { inst.textContent = t; }
function hideInst() { inst.style.opacity = '0'; }
function showH(id) { const e = document.getElementById(id); if (e) e.style.display = 'block'; }
function hideH(id) { const e = document.getElementById(id); if (e) e.style.display = 'none'; }
function g(id) { return document.getElementById(id); }
function setOp(id, v) { const e = g(id); if (e) e.setAttribute('opacity', v); }

function bowlCenter() {
  const e = g('bwl'), r = e.getBoundingClientRect(), sr = SC.getBoundingClientRect();
  return { x: r.left - sr.left + r.width / 2, y: r.top - sr.top + r.height / 2 };
}

function elRect(el) {
  const r = el.getBoundingClientRect(), sr = SC.getBoundingClientRect();
  return { l: r.left - sr.left, t: r.top - sr.top, w: r.width, h: r.height };
}

function poof(cx, cy, n) {
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div'); p.className = 'fp';
    const s = 5 + Math.random() * 8;
    p.style.cssText = `width:${s}px;height:${s}px;left:${cx + (Math.random() - .5) * 26 - s/2}px;top:${cy - s/2}px;opacity:0.9;`;
    SC.appendChild(p);
    const vx = (Math.random() - .5) * 90, vy = -(50 + Math.random() * 80); let t = 0;
    const iv = setInterval(() => {
      t += 0.026;
      p.style.left = (parseFloat(p.style.left) + vx * 0.026) + 'px';
      p.style.top = (parseFloat(p.style.top) + (vy * t + 120 * t * t) * 0.026) + 'px';
      p.style.opacity = Math.max(0, 0.9 - t * 1.05);
      if (t > 0.95) { clearInterval(iv); p.remove(); }
    }, 16);
  }
}

// FLOUR
g('fb').addEventListener('click', e => {
  if (step !== STEP.FLOUR || busy) return;
  busy = true; hideH('fh');
  const bag = g('fb'), b = bowlCenter();
  bag.style.pointerEvents = 'none';
  bag.style.transition = 'left 0.6s cubic-bezier(.34,1.4,.64,1), bottom 0.6s cubic-bezier(.34,1.4,.64,1), transform 0.6s ease';
  bag.style.left = (b.x - 20) + 'px'; bag.style.bottom = '240px'; bag.style.transform = 'rotate(-118deg) scale(1.1)';
  sfxPour();
  let pc = 0; const px = b.x + 10, py = SC.offsetHeight - 252;
  const di = setInterval(() => { poof(px, py, 4); if (++pc > 20) clearInterval(di); }, 75);
  setTimeout(() => { g('fib').style.transition = 'opacity 0.5s'; setOp('fib', '1'); poof(px, b.y - 6, 14); }, 630);
  setTimeout(() => { bag.style.transition = 'transform 0.45s ease-in, opacity 0.45s ease-in'; bag.style.transform = 'rotate(-130deg) scale(0.1)'; bag.style.opacity = '0'; }, 1390);
  setTimeout(() => { bag.style.display = 'none'; step = STEP.BUTTER; busy = false; setInst('Now add in the butter!'); showH('buh'); }, 1860);
});

function flyToBowl(el, arcH, frames, cb) {
  const r = elRect(el), b = bowlCenter(), sx = r.l, sy = r.t, dx = b.x - r.w / 2, dy = b.y - r.h / 2;
  el.style.position = 'absolute'; el.style.transition = 'none';
  el.style.left = sx + 'px'; el.style.top = sy + 'px'; el.style.bottom = 'auto'; el.style.right = 'auto';
  let f = 0;
  (function tick() {
    f++; const p = f / frames, e = p < .5 ? 2 * p * p : -1 + (4 - 2 * p) * p;
    el.style.left = (sx + (dx - sx) * e) + 'px';
    el.style.top = (sy + (dy - sy) * e + arcH * Math.sin(Math.PI * p)) + 'px';
    el.style.transform = `rotate(${p * 380}deg) scale(${1 - p * .5})`;
    el.style.opacity = (1 - Math.max(0, p - .75) * 4).toFixed(2);
    if (f < frames) requestAnimationFrame(tick); else { el.style.display = 'none'; cb(); }
  })();
}

// BUTTER
g('bu').addEventListener('click', e => {
  if (step !== STEP.BUTTER || busy) return;
  busy = true; hideH('buh');
  const el = g('bu'); el.style.pointerEvents = 'none'; sfxPlop();
  flyToBowl(el, -120, 68, () => { setOp('mxl', '0.5'); step = STEP.EGG; busy = false; setInst('Crack in the eggs!'); showH('egh'); });
});

// EGGS
g('eg').addEventListener('click', e => {
  if (step !== STEP.EGG || busy) return;
  busy = true; hideH('egh');
  const el = g('eg'); el.style.pointerEvents = 'none';
  setTimeout(() => { sfxCrack(); setOp('c1', '1'); setOp('c2', '1'); }, 60);
  setTimeout(() => {
    sfxCrack();
    g('et1').style.transition = 'transform .35s ease-out'; g('et2').style.transition = 'transform .35s ease-out';
    g('et1').style.transform = 'translateY(-16px) rotate(-22deg)'; g('et2').style.transform = 'translateY(-16px) rotate(22deg)';
  }, 260);
  setTimeout(() => {
    g('y1').style.transition = 'opacity .3s'; g('y2').style.transition = 'opacity .3s';
    setOp('y1', '1'); setOp('y2', '1');
  }, 500);
  setTimeout(() => {
    flyToBowl(el, -100, 66, () => {
      setOp('mxl', '0.78'); step = STEP.WHISK; busy = false;
      setInst('Mix all the ingredients together!'); showH('whh');
    });
  }, 920);
});

// WHISK
g('wh').addEventListener('click', e => {
  if (step !== STEP.WHISK || busy) return;
  busy = true; hideH('whh');
  const wh = g('wh'); wh.style.pointerEvents = 'none';
  const r = elRect(wh), b = bowlCenter(), sx = r.l, sy = r.t, dx = b.x - r.w / 2, dy = b.y - r.h - 16;
  wh.style.position = 'absolute'; wh.style.transition = 'none';
  wh.style.left = sx + 'px'; wh.style.top = sy + 'px'; wh.style.bottom = 'auto'; wh.style.right = 'auto';
  sfxWhisk();
  let f = 0;
  (function moveIn() {
    f++; const p = f / 36, e = p < .5 ? 2 * p * p : -1 + (4 - 2 * p) * p;
    wh.style.left = (sx + (dx - sx) * e) + 'px';
    wh.style.top = (sy + (dy - sy) * e - 45 * Math.sin(Math.PI * p)) + 'px';
    if (f < 36) requestAnimationFrame(moveIn); else doWhisk(wh, b, dx, dy);
  })();
});

function doWhisk(wh, bowl, cx, cy) {
  const SW = 8, W = 54, D = 280; let sw = 0;
  const fl = g('fib'), ml = g('mxl');
  function swing() {
    if (sw >= SW) { finishWhisk(wh, bowl); return; }
    const dir = sw % 2 === 0 ? 1 : -1, pr = sw / SW;
    wh.style.transition = `left ${D}ms ease-in-out, transform ${D}ms ease-in-out`;
    wh.style.left = (cx + dir * W) + 'px'; wh.style.transform = `rotate(${dir * 20}deg)`;
    fl.setAttribute('opacity', Math.max(0, 1 - pr * 2.2).toFixed(2));
    ml.setAttribute('opacity', Math.min(.95, pr * 1.8).toFixed(2));
    const ri = Math.round(240 - pr * 50), gi = Math.round(216 - pr * 70), bi = Math.round(120 - pr * 80);
    ml.setAttribute('fill', `rgb(${ri},${gi},${bi})`);
    sw++; setTimeout(swing, D + 30);
  }
  swing();
}

function finishWhisk(wh, bowl) {
  wh.style.transition = 'top .5s ease-in, opacity .5s ease-in';
  wh.style.top = (parseFloat(wh.style.top) - 80) + 'px'; wh.style.opacity = '0';
  setTimeout(() => wh.style.display = 'none', 520);
  setTimeout(() => g('mxl').setAttribute('opacity', '0'), 200);
  riseDough(bowl);
}

function riseDough(bowl) {
  const ri = g('dri'); let t = 0; setOp('dri', '1');
  (function anim() {
    t++; const p = Math.min(t / 60, 1), e = p < .5 ? 2 * p * p : -1 + (4 - 2 * p) * p;
    ri.setAttribute('ry', (4 + e * 16).toFixed(1)); ri.setAttribute('rx', '44'); ri.setAttribute('cy', (90 - e * 24).toFixed(1));
    const rv = Math.round(180 + e * 20), gv = Math.round(140 + e * 12), bv = Math.round(40 + e * 10);
    ri.setAttribute('fill', `rgb(${rv},${gv},${bv})`);
    if (t < 60) requestAnimationFrame(anim);
    else setTimeout(() => { setOp('dri', '0'); setOp('dbl', '1'); showDough(); }, 200);
  })();
}

function showDough() {
  g('dg').style.display = 'block'; g('dgh').style.display = 'block';
  step = STEP.BAKE; busy = false; setInst('Send the dough into the oven!');
}

// DOUGH TAP → OVEN
g('dg').addEventListener('click', e => {
  if (step !== STEP.BAKE || busy) return;
  busy = true; step = STEP.DONE;
  g('dg').style.pointerEvents = 'none'; hideH('dgh'); hideInst();
  const ov = g('ov'); ov.style.opacity = '1'; ov.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => {
    const bwl = g('bwl'); bwl.style.transition = 'opacity .5s'; bwl.style.opacity = '0';
    setTimeout(() => bwl.style.display = 'none', 500);
    sendDough();
  }, 1300);
});

function sendDough() {
  const dv = g('dg'), ov = g('ov'), or_ = elRect(ov);
  const sx = SC.offsetWidth / 2 - 50, sy = SC.offsetHeight - 270;
  dv.style.display = 'block'; dv.style.position = 'absolute';
  dv.style.left = sx + 'px'; dv.style.top = sy + 'px';
  dv.style.bottom = 'auto'; dv.style.right = 'auto'; dv.style.opacity = '1'; dv.style.transform = 'scale(1)';
  const dx = or_.l + or_.w * .42, dy = or_.t + or_.h * .52;
  setOp('og', '0.45'); g('df').setAttribute('fill', '#a03020');
  ov.style.transition = 'transform .12s'; ov.style.transform = 'translateX(-50%) scaleX(1.04)';
  setTimeout(() => ov.style.transform = 'translateX(-50%) scaleX(1)', 130);
  setTimeout(() => {
    let f = 0;
    (function fly() {
      f++; const p = f / 55, e = p < .5 ? 2 * p * p : -1 + (4 - 2 * p) * p;
      dv.style.left = (sx + (dx - sx) * e) + 'px';
      dv.style.top = (sy + (dy - sy) * e - 70 * Math.sin(Math.PI * p)) + 'px';
      dv.style.transform = `scale(${1 - p * .65})`;
      dv.style.opacity = (1 - Math.max(0, p - .7) * 3.3).toFixed(2);
      if (f < 55) requestAnimationFrame(fly);
      else {
        dv.style.display = 'none';
        g('df').setAttribute('fill', '#6a2f24');
        ov.style.transition = 'transform .15s'; ov.style.transform = 'translateX(-50%) scaleX(.97)';
        setTimeout(() => ov.style.transform = 'translateX(-50%) scaleX(1)', 160);
        g('badge').style.display = 'block';
        showRaw();
        setTimeout(transformToBaguette, 1500);
      }
    })();
  }, 380);
}

function showRaw() {
  setOp('tray', '1');
  ['rs','rb','rt','rh','rel','rer','rsm'].forEach(id => setOp(id, '1'));
}

function transformToBaguette() {
  ['rs','rb','rt','rh','rel','rer','rsm'].forEach(id => {
    const e = g(id); if (e) { e.style.transition = 'opacity 0.7s'; e.setAttribute('opacity', '0'); }
  });
  setTimeout(() => {
    setOp('og', '0.88');
    ['bsh','bba','bbo','btl','btr','bh1','bh2','bs1','bs2','bs3','bs4','bs5'].forEach(id => setOp(id, '1'));
    ['st1','st2','st3'].forEach(id => setOp(id, '0.8'));
    setOp('ml', '1'); setOp('td', '1');
    runTimer();
  }, 700);
}

function animFace(p) {
  const s = Math.min(p, 1);
  g('bel').setAttribute('r', (s * 12).toFixed(1));
  g('ber').setAttribute('r', (s * 12).toFixed(1));
  g('bes').setAttribute('r', (s * 4).toFixed(1));
  g('bes2').setAttribute('r', (s * 4).toFixed(1));
  g('bcl').setAttribute('rx', (s * 15).toFixed(1)); g('bcl').setAttribute('ry', (s * 9).toFixed(1));
  g('bcr').setAttribute('rx', (s * 15).toFixed(1)); g('bcr').setAttribute('ry', (s * 9).toFixed(1));
  g('bno').setAttribute('rx', (s * 5).toFixed(1)); g('bno').setAttribute('ry', (s * 3.5).toFixed(1));
  g('bsm').setAttribute('stroke-width', (s * 3).toFixed(1));
  const br = Math.round(232 + s * 10), bgv = Math.round(160 + s * 8), bv = Math.round(48 - s * 18);
  g('bbo').setAttribute('fill', `rgb(${br},${bgv},${bv})`);
}

function runTimer() {
  const labels = ['01:00','02:00','03:00','04:00'], td = g('td');
  td.textContent = '01:00'; let idx = 0;
  const iv = setInterval(() => {
    idx++;
    if (idx < labels.length) {
      td.textContent = labels[idx];
      try {
        const a = getAC(), o = a.createOscillator(); o.type = 'square'; o.frequency.value = 1200;
        const gn = a.createGain(); gn.gain.setValueAtTime(0.12, a.currentTime); gn.gain.linearRampToValueAtTime(0, a.currentTime + 0.04);
        o.connect(gn); gn.connect(a.destination); o.start(); o.stop(a.currentTime + 0.05);
      } catch(x) {}
      animFace(idx / 3);
    } else {
      clearInterval(iv); animFace(1);
      setTimeout(() => { sfxCele(); g('banner').classList.add('show'); g('rbtn').style.display = 'block'; }, 500);
    }
  }, 1500);
}

g('rbtn').addEventListener('click', () => location.reload());
</script>
